<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <g transform="translate(256, 256)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="32">
    <!-- Bell body: dome + flared skirt -->
    <path d="M -108,60
             C -108,-40 -60,-100 0,-100
             C 60,-100 108,-40 108,60
             L 130,100
             L -130,100 Z"
          fill="white" fill-opacity="0.1"/>
    <!-- Bell top knob -->
    <circle cx="0" cy="-118" r="16" fill="white"/>
    <!-- Clapper -->
    <circle cx="0" cy="140" r="22" fill="white" stroke="none"/>
    <!-- Radiating waves (push notification arcs) -->
    <path d="M -170,-40 C -190,-10 -190,40 -170,70" stroke-width="24" opacity="0.55"/>
    <path d="M 170,-40 C 190,-10 190,40 170,70" stroke-width="24" opacity="0.55"/>
  </g>
</svg>
